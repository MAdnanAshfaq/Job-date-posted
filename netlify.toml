# netlify.toml

[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "zisi"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"

# Redirect all non-asset requests to index.html (SPA support)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"]}
